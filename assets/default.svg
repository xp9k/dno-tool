<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Monitor body -->
  <rect x="16" y="16" width="96" height="72" rx="12" fill="#2F3542"/>
  <!-- Screen (neutral gray) -->
  <rect x="24" y="24" width="80" height="52" rx="8" fill="#747D8C" opacity="0.9"/>
  <!-- Question marks showing unknown state -->
  <text x="48" y="54" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="20" font-weight="bold" opacity="0.4">?</text>
  <text x="64" y="54" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="20" font-weight="bold" opacity="0.3">?</text>
  <text x="80" y="54" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="20" font-weight="bold" opacity="0.2">?</text>
  <!-- Stand -->
  <path d="M52 90 L76 90 L70 106 L58 106 Z" fill="#2F3542"/>
  <rect x="48" y="106" width="32" height="8" rx="4" fill="#2F3542"/>
  <!-- Neutral indicator -->
  <circle cx="64" cy="98" r="6" fill="#A4B0BE"/>
  <circle cx="64" cy="98" r="6" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
</svg>