<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="32" y1="32" x2="224" y2="224" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>

    <linearGradient id="device" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#CBD5E1"/>
    </linearGradient>

    <filter id="shadow" x="0" y="0" width="256" height="256" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="24" y="24" width="208" height="208" rx="48" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Left device -->
  <rect x="52" y="88" width="56" height="80" rx="14" fill="url(#device)"/>
  <rect x="62" y="98" width="36" height="52" rx="8" fill="#0F172A"/>

  <!-- Right device -->
  <rect x="148" y="88" width="56" height="80" rx="14" fill="url(#device)"/>
  <rect x="158" y="98" width="36" height="52" rx="8" fill="#0F172A"/>

  <!-- Connection line -->
  <path d="M108 128H148" stroke="#E0F2FE" stroke-width="10" stroke-linecap="round"/>

  <!-- Signal circles -->
  <circle cx="128" cy="128" r="12" fill="#FFFFFF"/>
  <circle cx="128" cy="128" r="5" fill="#38BDF8"/>

  <!-- Connection waves -->
  <path d="M120 92C124 86 132 86 136 92" stroke="#E0F2FE" stroke-width="5" stroke-linecap="round"/>
  <path d="M114 78C122 68 134 68 142 78" stroke="#E0F2FE" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
</svg>