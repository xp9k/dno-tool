<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ramBody" x1="32" y1="64" x2="224" y2="192" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#15803D"/>
    </linearGradient>

    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>

    <filter id="shadow" x="0" y="0" width="256" height="256" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- RAM stick body -->
  <rect x="24" y="72" width="208" height="96" rx="18" fill="url(#ramBody)" filter="url(#shadow)"/>

  <!-- Top highlight -->
  <rect x="32" y="80" width="192" height="10" rx="5" fill="white" opacity="0.15"/>

  <!-- Memory chips -->
  <g>
    <rect x="44" y="92" width="28" height="56" rx="6" fill="url(#chip)"/>
    <rect x="80" y="92" width="28" height="56" rx="6" fill="url(#chip)"/>
    <rect x="116" y="92" width="28" height="56" rx="6" fill="url(#chip)"/>
    <rect x="152" y="92" width="28" height="56" rx="6" fill="url(#chip)"/>
    <rect x="188" y="92" width="28" height="56" rx="6" fill="url(#chip)"/>
  </g>

  <!-- Circuit lines -->
  <g stroke="#BBF7D0" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <line x1="58" y1="148" x2="58" y2="160"/>
    <line x1="94" y1="148" x2="94" y2="160"/>
    <line x1="130" y1="148" x2="130" y2="160"/>
    <line x1="166" y1="148" x2="166" y2="160"/>
    <line x1="202" y1="148" x2="202" y2="160"/>
  </g>

  <!-- Gold connector pins -->
  <g fill="#FACC15">
    <rect x="42" y="168" width="8" height="24" rx="2"/>
    <rect x="58" y="168" width="8" height="24" rx="2"/>
    <rect x="74" y="168" width="8" height="24" rx="2"/>
    <rect x="90" y="168" width="8" height="24" rx="2"/>
    <rect x="106" y="168" width="8" height="24" rx="2"/>
    <rect x="122" y="168" width="8" height="24" rx="2"/>
    <rect x="138" y="168" width="8" height="24" rx="2"/>
    <rect x="154" y="168" width="8" height="24" rx="2"/>
    <rect x="170" y="168" width="8" height="24" rx="2"/>
    <rect x="186" y="168" width="8" height="24" rx="2"/>
    <rect x="202" y="168" width="8" height="24" rx="2"/>
  </g>

  <!-- Small memory label -->
  <rect x="150" y="102" width="50" height="14" rx="4" fill="#DCFCE7" opacity="0.9"/>
</svg>