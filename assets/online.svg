<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Monitor body -->
  <rect x="16" y="16" width="96" height="72" rx="12" fill="#2F3542"/>
  <!-- Screen glow layers -->
  <rect x="18" y="18" width="92" height="64" rx="12" fill="#00FF41" opacity="0.18"/>
  <rect x="20" y="20" width="88" height="60" rx="10" fill="#00FF41" opacity="0.30"/>
  <rect x="22" y="22" width="84" height="56" rx="10" fill="#00FF41" opacity="0.45"/>
  <!-- Screen (electric green) -->
  <rect x="24" y="24" width="80" height="52" rx="8" fill="#00FF41"/>
  <!-- Code lines on screen -->
  <rect x="32" y="32" width="40" height="4" rx="2" fill="#2F3542" opacity="0.3"/>
  <rect x="32" y="42" width="60" height="4" rx="2" fill="#2F3542" opacity="0.2"/>
  <rect x="32" y="52" width="50" height="4" rx="2" fill="#2F3542" opacity="0.2"/>
  <rect x="32" y="62" width="30" height="4" rx="2" fill="#2F3542" opacity="0.2"/>
  <!-- Stand -->
  <path d="M52 90 L76 90 L70 106 L58 106 Z" fill="#2F3542"/>
  <rect x="48" y="106" width="32" height="8" rx="4" fill="#2F3542"/>
  <!-- Online indicator -->
  <circle cx="64" cy="98" r="6" fill="#00FF41"/>
  <circle cx="64" cy="98" r="6" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
</svg>