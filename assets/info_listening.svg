<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="32" y1="32" x2="224" y2="224" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>

    <linearGradient id="port" x1="72" y1="72" x2="184" y2="184" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>

    <filter id="shadow" x="0" y="0" width="256" height="256" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="24" y="24" width="208" height="208" rx="40" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- WIFI (slightly higher) -->
  <g>
    <path d="M72 76C96 52 160 52 184 76" stroke="#7DD3FC" stroke-width="10" stroke-linecap="round"/>
    <path d="M88 96C112 76 144 76 168 96" stroke="#BAE6FD" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <circle cx="128" cy="116" r="10" fill="#E0F2FE"/>
  </g>

  <!-- RJ45 (shifted slightly up) -->
  <rect x="48" y="106" width="160" height="110" rx="20" fill="url(#port)"/>

  <!-- Inner cavity -->
  <rect x="72" y="134" width="112" height="62" rx="10" fill="#0F172A"/>

  <!-- Pins -->
  <g fill="#FACC15">
    <rect x="80" y="136" width="8" height="22" rx="2"/>
    <rect x="96" y="136" width="8" height="22" rx="2"/>
    <rect x="112" y="136" width="8" height="22" rx="2"/>
    <rect x="128" y="136" width="8" height="22" rx="2"/>
    <rect x="144" y="136" width="8" height="22" rx="2"/>
    <rect x="160" y="136" width="8" height="22" rx="2"/>
  </g>

  <!-- LEDs -->
  <circle cx="60" cy="126" r="6" fill="#22C55E"/>
  <circle cx="60" cy="146" r="6" fill="#22C55E"/>
  <circle cx="60" cy="166" r="6" fill="#22C55E"/>
</svg>