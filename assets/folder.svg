  <!-- Folder front part -->
  <path d="M12 58 L12 106 Q12 114 20 114 L108 114 Q116 114 116 106 L116 58 Q116 50 108 50 L20 50 Q12 50 12 58Z"
        fill="url(#folderFront)" filter="url(#shadow)"/>

  <!-- Inside shadow detail -->
  <path d="M12 58 L116 58 L108 50 L20 50Z" fill="#C79415" opacity="0.2"/>

  <!-- Highlight line -->
  <path d="M20 52 L108 52" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
