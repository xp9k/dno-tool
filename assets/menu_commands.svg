<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gearDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B4552"/>
      <stop offset="100%" stop-color="#1F2732"/>
    </linearGradient>

    <linearGradient id="gearBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4AA3FF"/>
