<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Gear body -->
  <circle cx="64" cy="64" r="38" fill="#5F27CD"/>
  <!-- Gear teeth -->
  <g fill="#5F27CD" stroke="#E8E8E8" stroke-width="1">
    <rect x="56" y="14" width="16" height="18" rx="4"/>
    <rect x="56" y="96" width="16" height="18" rx="4"/>
    <rect x="14" y="56" width="18" height="16" rx="4"/>
    <rect x="96" y="56" width="18" height="16" rx="4"/>
    <rect x="24" y="24" width="16" height="16" rx="4" transform="rotate(-45 32 32)"/>
    <rect x="88" y="24" width="16" height="16" rx="4" transform="rotate(45 96 32)"/>
    <rect x="24" y="88" width="16" height="16" rx="4" transform="rotate(45 32 96)"/>
    <rect x="88" y="88" width="16" height="16" rx="4" transform="rotate(-45 96 96)"/>
  </g>
  <!-- Gear center -->
  <circle cx="64" cy="64" r="38" fill="#5F27CD"/>
  <circle cx="64" cy="64" r="24" fill="none" stroke="#FFFFFF" stroke-width="6"/>
  <!-- Terminal screen inside -->
  <rect x="48" y="48" width="32" height="32" rx="6" fill="#2F3542"/>
  <path d="M52 58 L58 64 L52 70" stroke="#33D9B2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="60" y="66" width="14" height="2" rx="1" fill="#FD79A8"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="6" fill="#FFFFFF"/>
</svg>