<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="diskBody" x1="48" y1="40" x2="208" y2="216" gradientUnits="userSpaceOnUse">
      <stop stop-color="#64748B"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>

    <linearGradient id="platter" x1="80" y1="72" x2="176" y2="168" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E2E8F0"/>
      <stop offset="1" stop-color="#94A3B8"/>
    </linearGradient>

    <linearGradient id="usage" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>

    <filter id="shadow" x="0" y="0" width="256" height="256" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- HDD Body -->
  <rect x="40" y="32" width="176" height="192" rx="24" fill="url(#diskBody)" filter="url(#shadow)"/>

  <!-- Inner plate -->
  <rect x="56" y="48" width="144" height="160" rx="18" fill="#1E293B"/>

  <!-- Disk platter -->
  <circle cx="128" cy="112" r="44" fill="url(#platter)"/>
  <circle cx="128" cy="112" r="10" fill="#475569"/>

  <!-- Read arm -->
  <path d="M160 144L138 120" stroke="#CBD5E1" stroke-width="8" stroke-linecap="round"/>
  <circle cx="160" cy="144" r="8" fill="#E2E8F0"/>

  <!-- Disk usage bar -->
  <rect x="72" y="176" width="112" height="14" rx="7" fill="#334155"/>
  <rect x="72" y="176" width="76" height="14" rx="7" fill="url(#usage)"/>

  <!-- Small indicator -->
  <circle cx="184" cy="64" r="5" fill="#22C55E"/>
</svg>